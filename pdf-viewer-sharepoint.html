<style>
/* ===== PDF Viewer — SharePoint Script Editor ===== */
.pdf-viewer {
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px;
  color: #323130;
  box-sizing: border-box;
}
.pdf-viewer *, .pdf-viewer *::before, .pdf-viewer *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* Header */
.pdf-viewer__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
  margin-bottom: 24px;
}
.pdf-viewer__title {
  font-size: 22px;
  font-weight: 600;
  color: #201f1e;
  display: flex;
  align-items: center;
  gap: 10px;
}
.pdf-viewer__title svg {
  width: 24px;
  height: 24px;
  color: #0078d4;
}
.pdf-viewer__count {
  font-size: 13px;
  font-weight: 400;
  color: #605e5c;
  background: #f3f2f1;
  padding: 2px 10px;
  border-radius: 12px;
}

/* Search */
.pdf-viewer__search {
  position: relative;
  min-width: 280px;
  flex: 0 1 360px;
}
.pdf-viewer__search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  color: #605e5c;
  pointer-events: none;
}
.pdf-viewer__search input {
  width: 100%;
  padding: 8px 12px 8px 36px;
  border: 1px solid #8a8886;
  border-radius: 4px;
  font-size: 14px;
  font-family: inherit;
  color: #323130;
  background: #fff;
  outline: none;
  transition: border-color 0.15s;
}
.pdf-viewer__search input:focus {
  border-color: #0078d4;
  box-shadow: 0 0 0 1px #0078d4;
}
.pdf-viewer__search input::placeholder {
  color: #a19f9d;
}

/* Loading */
.pdf-viewer__loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: #605e5c;
  gap: 12px;
}
.pdf-viewer__spinner {
  width: 32px;
  height: 32px;
  border: 3px solid #edebe9;
  border-top-color: #0078d4;
  border-radius: 50%;
  animation: pdfSpin 0.8s linear infinite;
}
@keyframes pdfSpin {
  to { transform: rotate(360deg); }
}

/* Error */
.pdf-viewer__error {
  padding: 16px 20px;
  background: #fde7e9;
  border: 1px solid #f3d6d8;
  border-radius: 4px;
  color: #a4262c;
  font-size: 14px;
  margin-bottom: 16px;
}

/* Empty */
.pdf-viewer__empty {
  text-align: center;
  padding: 48px 20px;
  color: #a19f9d;
  font-size: 14px;
}
.pdf-viewer__empty svg {
  width: 48px;
  height: 48px;
  margin-bottom: 12px;
  opacity: 0.4;
}

/* Layout — sidebar + preview */
.pdf-viewer__layout {
  display: flex;
  gap: 20px;
  min-height: 520px;
}

/* File list (sidebar) */
.pdf-viewer__list {
  width: 340px;
  flex-shrink: 0;
  overflow-y: auto;
  max-height: 600px;
  border: 1px solid #edebe9;
  border-radius: 6px;
  background: #fff;
}
.pdf-viewer__item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid #f3f2f1;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
}
.pdf-viewer__item:last-child { border-bottom: none; }
.pdf-viewer__item:hover { background: #f3f2f1; }
.pdf-viewer__item--active {
  background: #e8f4fd !important;
  border-left: 3px solid #0078d4;
  padding-left: 13px;
}
.pdf-viewer__item-icon {
  width: 32px;
  height: 32px;
  flex-shrink: 0;
  background: #fff4f4;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.pdf-viewer__item-icon svg {
  width: 18px;
  height: 18px;
  color: #d13438;
}
.pdf-viewer__item-info {
  flex: 1;
  min-width: 0;
}
.pdf-viewer__item-name {
  font-size: 13px;
  font-weight: 600;
  color: #323130;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pdf-viewer__item-meta {
  font-size: 11px;
  color: #a19f9d;
  margin-top: 2px;
}
.pdf-viewer__item-open {
  width: 28px;
  height: 28px;
  border: none;
  background: transparent;
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #605e5c;
  flex-shrink: 0;
  transition: background 0.15s, color 0.15s;
}
.pdf-viewer__item-open:hover {
  background: #e1dfdd;
  color: #0078d4;
}
.pdf-viewer__item-open svg {
  width: 14px;
  height: 14px;
}

/* Preview panel */
.pdf-viewer__preview {
  flex: 1;
  border: 1px solid #edebe9;
  border-radius: 6px;
  background: #faf9f8;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}
.pdf-viewer__preview-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #edebe9;
  flex-shrink: 0;
}
.pdf-viewer__preview-title {
  font-size: 13px;
  font-weight: 600;
  color: #323130;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  margin-right: 12px;
}
.pdf-viewer__preview-actions {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.pdf-viewer__btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  border: 1px solid #8a8886;
  border-radius: 4px;
  background: #fff;
  color: #323130;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.pdf-viewer__btn:hover {
  background: #f3f2f1;
  border-color: #605e5c;
}
.pdf-viewer__btn--primary {
  background: #0078d4;
  color: #fff;
  border-color: #0078d4;
}
.pdf-viewer__btn--primary:hover {
  background: #106ebe;
  border-color: #106ebe;
}
.pdf-viewer__btn svg {
  width: 14px;
  height: 14px;
}
.pdf-viewer__preview-frame {
  flex: 1;
  width: 100%;
  border: none;
  background: #fff;
}
.pdf-viewer__preview-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #a19f9d;
  gap: 8px;
  font-size: 14px;
}
.pdf-viewer__preview-empty svg {
  width: 56px;
  height: 56px;
  opacity: 0.3;
}

/* Responsive */
@media (max-width: 860px) {
  .pdf-viewer__layout {
    flex-direction: column;
  }
  .pdf-viewer__list {
    width: 100%;
    max-height: 280px;
  }
  .pdf-viewer__preview {
    min-height: 450px;
  }
}
@media (max-width: 560px) {
  .pdf-viewer { padding: 12px; }
  .pdf-viewer__header { flex-direction: column; align-items: stretch; }
  .pdf-viewer__search { min-width: unset; flex: 1; }
}
</style>

<div class="pdf-viewer" id="pdfViewer">
  <!-- Header -->
  <div class="pdf-viewer__header">
    <h2 class="pdf-viewer__title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
      </svg>
      Certificados do SGI
      <span class="pdf-viewer__count" id="pdfCount">—</span>
    </h2>
    <div class="pdf-viewer__search">
      <svg class="pdf-viewer__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="text" id="pdfSearch" placeholder="Buscar certificado por nome..." />
    </div>
  </div>

  <!-- Loading state -->
  <div class="pdf-viewer__loading" id="pdfLoading">
    <div class="pdf-viewer__spinner"></div>
    <span>Carregando certificados...</span>
  </div>

  <!-- Error state -->
  <div class="pdf-viewer__error" id="pdfError" style="display:none"></div>

  <!-- Content -->
  <div class="pdf-viewer__layout" id="pdfLayout" style="display:none">
    <!-- File list -->
    <div class="pdf-viewer__list" id="pdfList"></div>

    <!-- Preview -->
    <div class="pdf-viewer__preview" id="pdfPreview">
      <div class="pdf-viewer__preview-empty" id="pdfPreviewEmpty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <span>Selecione um certificado para visualizar</span>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  // ====== CONFIGURAÇÃO ======
  var CONFIG = {
    siteUrl: 'https://sodexo.sharepoint.com/sites/SGISodexo',
    listTitle: 'Certificados do SGI'
  };
  // ===========================

  var state = { files: [], filtered: [], activeIndex: -1 };

  var els = {
    viewer:       document.getElementById('pdfViewer'),
    loading:      document.getElementById('pdfLoading'),
    error:        document.getElementById('pdfError'),
    layout:       document.getElementById('pdfLayout'),
    list:         document.getElementById('pdfList'),
    preview:      document.getElementById('pdfPreview'),
    previewEmpty: document.getElementById('pdfPreviewEmpty'),
    search:       document.getElementById('pdfSearch'),
    count:        document.getElementById('pdfCount')
  };

  // Fetch PDFs from library
  function fetchPDFs() {
    var apiUrl = CONFIG.siteUrl +
      "/_api/web/lists/getbytitle('" + encodeURIComponent(CONFIG.listTitle) + "')/items" +
      "?$select=FileLeafRef,FileRef,File/Length,File/TimeLastModified" +
      "&$expand=File" +
      "&$filter=substringof('.pdf',FileLeafRef)" +
      "&$orderby=FileLeafRef" +
      "&$top=500";

    return fetch(apiUrl, {
      method: 'GET',
      headers: {
        'Accept': 'application/json;odata=verbose'
      },
      credentials: 'include'
    })
    .then(function(r) {
      if (!r.ok) throw new Error('Erro ' + r.status + ': não foi possível acessar a biblioteca.');
      return r.json();
    })
    .then(function(data) {
      return data.d.results.map(function(item) {
        return {
          name: item.FileLeafRef,
          path: item.FileRef,
          size: item.File.Length ? formatSize(parseInt(item.File.Length, 10)) : '',
          modified: item.File.TimeLastModified ? formatDate(item.File.TimeLastModified) : ''
        };
      });
    });
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(0) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
  }

  function formatDate(iso) {
    try {
      var d = new Date(iso);
      return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    } catch(e) { return ''; }
  }

  // Render file list
  function renderList(files) {
    state.filtered = files;
    els.count.textContent = files.length + (files.length === 1 ? ' arquivo' : ' arquivos');

    if (files.length === 0) {
      els.list.innerHTML =
        '<div class="pdf-viewer__empty">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>' +
          '<span>Nenhum certificado encontrado</span>' +
        '</div>';
      return;
    }

    var html = '';
    files.forEach(function(file, i) {
      var isActive = i === state.activeIndex;
      html +=
        '<div class="pdf-viewer__item' + (isActive ? ' pdf-viewer__item--active' : '') + '" data-index="' + i + '">' +
          '<div class="pdf-viewer__item-icon">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
              '<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>' +
            '</svg>' +
          '</div>' +
          '<div class="pdf-viewer__item-info">' +
            '<div class="pdf-viewer__item-name" title="' + escapeHtml(file.name) + '">' + escapeHtml(file.name.replace('.pdf','')) + '</div>' +
            '<div class="pdf-viewer__item-meta">' + file.size + (file.modified ? ' · ' + file.modified : '') + '</div>' +
          '</div>' +
          '<button class="pdf-viewer__item-open" title="Abrir em nova aba" data-open="' + i + '">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
              '<path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>' +
            '</svg>' +
          '</button>' +
        '</div>';
    });
    els.list.innerHTML = html;
  }

  // Show preview
  function showPreview(index) {
    var file = state.filtered[index];
    if (!file) return;
    state.activeIndex = index;

    // Re-render list to update active state
    renderList(state.filtered);

    var previewUrl = CONFIG.siteUrl + '/_layouts/15/WopiFrame.aspx?sourcedoc=' +
      encodeURIComponent(file.path) + '&action=embedview';
    var openUrl = CONFIG.siteUrl + '/_layouts/15/WopiFrame.aspx?sourcedoc=' +
      encodeURIComponent(file.path) + '&action=view';

    els.preview.innerHTML =
      '<div class="pdf-viewer__preview-bar">' +
        '<span class="pdf-viewer__preview-title" title="' + escapeHtml(file.name) + '">' + escapeHtml(file.name) + '</span>' +
        '<div class="pdf-viewer__preview-actions">' +
          '<a href="' + escapeHtml(openUrl) + '" target="_blank" class="pdf-viewer__btn pdf-viewer__btn--primary" rel="noopener">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
              '<path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>' +
            '</svg>' +
            'Abrir em nova aba' +
          '</a>' +
        '</div>' +
      '</div>' +
      '<iframe class="pdf-viewer__preview-frame" src="' + escapeHtml(previewUrl) + '" title="Preview"></iframe>';
  }

  // Event delegation
  els.list.addEventListener('click', function(e) {
    // Open in new tab button
    var openBtn = e.target.closest('[data-open]');
    if (openBtn) {
      e.stopPropagation();
      var idx = parseInt(openBtn.getAttribute('data-open'), 10);
      var f = state.filtered[idx];
      if (f) {
        var url = CONFIG.siteUrl + '/_layouts/15/WopiFrame.aspx?sourcedoc=' +
          encodeURIComponent(f.path) + '&action=view';
        window.open(url, '_blank');
      }
      return;
    }
    // Select item
    var item = e.target.closest('[data-index]');
    if (item) {
      showPreview(parseInt(item.getAttribute('data-index'), 10));
    }
  });

  // Search
  var searchTimer;
  els.search.addEventListener('input', function() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(function() {
      var q = els.search.value.toLowerCase().trim();
      state.activeIndex = -1;
      if (!q) {
        renderList(state.files);
      } else {
        var filtered = state.files.filter(function(f) {
          return f.name.toLowerCase().indexOf(q) !== -1;
        });
        renderList(filtered);
      }
      // Reset preview
      els.preview.innerHTML =
        '<div class="pdf-viewer__preview-empty" id="pdfPreviewEmpty">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
            '<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>' +
          '</svg>' +
          '<span>Selecione um certificado para visualizar</span>' +
        '</div>';
    }, 250);
  });

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  function showError(msg) {
    els.loading.style.display = 'none';
    els.error.style.display = 'block';
    els.error.textContent = msg;
  }

  // Init
  fetchPDFs()
    .then(function(files) {
      state.files = files;
      els.loading.style.display = 'none';
      els.layout.style.display = 'flex';
      renderList(files);
    })
    .catch(function(err) {
      showError(err.message || 'Erro ao carregar certificados.');
    });
})();
</script>
