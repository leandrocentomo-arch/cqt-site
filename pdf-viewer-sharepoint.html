<style>
/* ===== PDF Viewer — SharePoint Script Editor v3 ===== */
.pv {
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  max-width: 100%;
  margin: 0 auto;
  padding: 20px 0;
  color: #323130;
  box-sizing: border-box;
}
.pv *, .pv *::before, .pv *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* Header */
.pv__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 16px;
  padding: 0 4px;
}
.pv__title {
  font-size: 20px;
  font-weight: 600;
  color: #201f1e;
  display: flex;
  align-items: center;
  gap: 8px;
}
.pv__title svg { width: 22px; height: 22px; color: #0078d4; flex-shrink: 0; }
.pv__count {
  font-size: 12px;
  font-weight: 400;
  color: #605e5c;
  background: #f3f2f1;
  padding: 2px 10px;
  border-radius: 12px;
  margin-left: 4px;
}

/* Search */
.pv__search {
  position: relative;
  width: 320px;
  flex-shrink: 0;
}
.pv__search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 15px;
  height: 15px;
  color: #605e5c;
  pointer-events: none;
}
.pv__search input {
  width: 100%;
  padding: 7px 10px 7px 32px;
  border: 1px solid #8a8886;
  border-radius: 4px;
  font-size: 13px;
  font-family: inherit;
  color: #323130;
  background: #fff;
  outline: none;
  transition: border-color 0.15s;
}
.pv__search input:focus {
  border-color: #0078d4;
  box-shadow: 0 0 0 1px #0078d4;
}
.pv__search input::placeholder { color: #a19f9d; }

/* Loading / Error / Empty */
.pv__loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: #605e5c;
  gap: 12px;
}
.pv__spinner {
  width: 28px;
  height: 28px;
  border: 3px solid #edebe9;
  border-top-color: #0078d4;
  border-radius: 50%;
  animation: pvSpin 0.8s linear infinite;
}
@keyframes pvSpin { to { transform: rotate(360deg); } }
.pv__error {
  padding: 14px 18px;
  background: #fde7e9;
  border: 1px solid #f3d6d8;
  border-radius: 4px;
  color: #a4262c;
  font-size: 13px;
  margin-bottom: 12px;
}
.pv__empty {
  text-align: center;
  padding: 40px 20px;
  color: #a19f9d;
  font-size: 13px;
}

/* Layout — sidebar + PDF */
.pv__layout {
  display: flex;
  gap: 0;
  height: 780px;
  border: 1px solid #e1dfdd;
  border-radius: 6px;
  overflow: hidden;
  background: #fff;
}

/* Left: File list */
.pv__list {
  width: 360px;
  flex-shrink: 0;
  overflow-y: auto;
  border-right: 1px solid #e1dfdd;
  background: #faf9f8;
}
.pv__item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid #f3f2f1;
  cursor: pointer;
  transition: background 0.12s;
}
.pv__item:hover { background: #f3f2f1; }
.pv__item--active {
  background: #e8f4fd !important;
  border-left: 3px solid #0078d4;
  padding-left: 11px;
}
.pv__item-icon {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
  background: #fef0f0;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 1px;
}
.pv__item-icon svg { width: 15px; height: 15px; color: #d13438; }
.pv__item-info { flex: 1; min-width: 0; }
.pv__item-name {
  font-size: 12.5px;
  font-weight: 600;
  color: #323130;
  line-height: 1.35;
  word-break: break-word;
}
.pv__item-meta {
  font-size: 11px;
  color: #a19f9d;
  margin-top: 3px;
}
.pv__item-open {
  width: 26px;
  height: 26px;
  border: none;
  background: transparent;
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #a19f9d;
  flex-shrink: 0;
  margin-top: 1px;
  transition: background 0.12s, color 0.12s;
}
.pv__item-open:hover { background: #e1dfdd; color: #0078d4; }
.pv__item-open svg { width: 13px; height: 13px; }

/* Right: PDF area */
.pv__pdf {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: #f5f5f5;
}
.pv__pdf-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  background: #fff;
  border-bottom: 1px solid #e1dfdd;
  flex-shrink: 0;
  min-height: 42px;
}
.pv__pdf-name {
  font-size: 12.5px;
  font-weight: 600;
  color: #323130;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  margin-right: 10px;
}
.pv__pdf-actions { display: flex; gap: 6px; flex-shrink: 0; }
.pv__btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  font-size: 11.5px;
  font-weight: 600;
  font-family: inherit;
  border: 1px solid #c8c6c4;
  border-radius: 4px;
  background: #fff;
  color: #323130;
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
  text-decoration: none;
}
.pv__btn:hover { background: #f3f2f1; border-color: #8a8886; }
.pv__btn--primary { background: #0078d4; color: #fff; border-color: #0078d4; }
.pv__btn--primary:hover { background: #106ebe; }
.pv__btn svg { width: 13px; height: 13px; }

/* iframe do PDF */
.pv__pdf-frame {
  flex: 1;
  width: 100%;
  border: none;
  background: #e8e8e8;
}

/* Placeholder quando nenhum PDF está selecionado */
.pv__pdf-placeholder {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #a19f9d;
  gap: 10px;
  font-size: 14px;
}
.pv__pdf-placeholder svg { width: 64px; height: 64px; opacity: 0.25; }

/* Responsive */
@media (max-width: 900px) {
  .pv__layout { flex-direction: column; height: auto; }
  .pv__list { width: 100%; max-height: 260px; border-right: none; border-bottom: 1px solid #e1dfdd; }
  .pv__pdf { min-height: 500px; }
}
@media (max-width: 560px) {
  .pv { padding: 8px 0; }
  .pv__header { flex-direction: column; align-items: stretch; }
  .pv__search { width: 100%; }
}
</style>

<div class="pv" id="pvRoot">
  <!-- Header -->
  <div class="pv__header">
    <h2 class="pv__title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Certificados do SGI
      <span class="pv__count" id="pvCount">—</span>
    </h2>
    <div class="pv__search">
      <svg class="pv__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="pvSearch" placeholder="Buscar certificado por nome..." />
    </div>
  </div>

  <!-- Loading -->
  <div class="pv__loading" id="pvLoading">
    <div class="pv__spinner"></div>
    <span>Carregando certificados...</span>
  </div>

  <!-- Error -->
  <div class="pv__error" id="pvError" style="display:none"></div>

  <!-- Main layout -->
  <div class="pv__layout" id="pvLayout" style="display:none">
    <!-- Left: list -->
    <div class="pv__list" id="pvList"></div>
    <!-- Right: PDF viewer -->
    <div class="pv__pdf" id="pvPdf">
      <div class="pv__pdf-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span>Selecione um certificado para visualizar</span>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  /* ============================================================
     CONFIGURAÇÃO — ajuste conforme seu ambiente
     ============================================================ */
  var SITE_URL  = 'https://sodexo.sharepoint.com/sites/SGISodexo';
  var LIST_NAME = 'Certificados do SGI';
  /* ============================================================ */

  var ORIGIN = new URL(SITE_URL).origin;
  var state  = { files: [], filtered: [], active: -1 };

  /* DOM refs */
  var $loading = document.getElementById('pvLoading');
  var $error   = document.getElementById('pvError');
  var $layout  = document.getElementById('pvLayout');
  var $list    = document.getElementById('pvList');
  var $pdf     = document.getElementById('pvPdf');
  var $search  = document.getElementById('pvSearch');
  var $count   = document.getElementById('pvCount');

  /* ---- helpers ---- */
  function esc(s) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
  }
  function fmtSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b / 1024).toFixed(0) + ' KB';
    return (b / 1048576).toFixed(1) + ' MB';
  }
  function fmtDate(iso) {
    try { return new Date(iso).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'}); }
    catch(e) { return ''; }
  }

  /* ---- Build embed URL ----
     Strategies (tested in order via iframe onload/onerror):
     1. /_layouts/15/embed.aspx?UniqueId=GUID
     2. Direct PDF URL (browser native PDF viewer)
     3. Office Online viewer
  */
  function embedUrl(file) {
    // Strategy 1: SharePoint modern embed (most reliable for SPO)
    return SITE_URL + '/_layouts/15/embed.aspx?UniqueId=' + file.uniqueId;
  }
  function directUrl(file) {
    return ORIGIN + file.path;
  }
  function officeViewerUrl(file) {
    return 'https://view.officeapps.live.com/op/embed.aspx?src=' +
      encodeURIComponent(ORIGIN + file.path);
  }

  /* ---- Fetch PDFs ---- */
  function fetchPDFs() {
    var url = SITE_URL +
      "/_api/web/lists/getbytitle('" + encodeURIComponent(LIST_NAME) + "')/items" +
      "?$select=FileLeafRef,FileRef,File/Length,File/TimeLastModified,File/UniqueId" +
      "&$expand=File" +
      "&$filter=substringof('.pdf',FileLeafRef)" +
      "&$orderby=FileLeafRef asc" +
      "&$top=500";

    return fetch(url, {
      method: 'GET',
      headers: { 'Accept': 'application/json;odata=verbose' },
      credentials: 'include'
    })
    .then(function(r) {
      if (!r.ok) throw new Error('Erro ' + r.status + ': não foi possível acessar a biblioteca.');
      return r.json();
    })
    .then(function(data) {
      return data.d.results.map(function(item) {
        return {
          name: item.FileLeafRef,
          path: item.FileRef,
          uniqueId: item.File.UniqueId,
          size: item.File.Length ? fmtSize(+item.File.Length) : '',
          modified: item.File.TimeLastModified ? fmtDate(item.File.TimeLastModified) : ''
        };
      });
    });
  }

  /* ---- Render list ---- */
  function renderList(files) {
    state.filtered = files;
    $count.textContent = files.length + (files.length === 1 ? ' arquivo' : ' arquivos');

    if (!files.length) {
      $list.innerHTML = '<div class="pv__empty">Nenhum certificado encontrado.</div>';
      return;
    }

    var h = '';
    files.forEach(function(f, i) {
      var active = i === state.active;
      var label = f.name.replace(/\.pdf$/i, '');
      h += '<div class="pv__item' + (active ? ' pv__item--active' : '') + '" data-i="' + i + '">' +
        '<div class="pv__item-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>' +
        '<div class="pv__item-info">' +
          '<div class="pv__item-name">' + esc(label) + '</div>' +
          '<div class="pv__item-meta">' + f.size + (f.modified ? ' · ' + f.modified : '') + '</div>' +
        '</div>' +
        '<button class="pv__item-open" title="Abrir em nova aba" data-open="' + i + '">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>' +
        '</button>' +
      '</div>';
    });
    $list.innerHTML = h;
  }

  /* ---- Show PDF ---- */
  function showPdf(index) {
    var file = state.filtered[index];
    if (!file) return;
    state.active = index;
    renderList(state.filtered);

    var direct  = directUrl(file);
    var embed   = embedUrl(file);
    var office  = officeViewerUrl(file);

    $pdf.innerHTML =
      '<div class="pv__pdf-bar">' +
        '<span class="pv__pdf-name" title="' + esc(file.name) + '">' + esc(file.name) + '</span>' +
        '<div class="pv__pdf-actions">' +
          '<a href="' + esc(direct) + '" target="_blank" class="pv__btn" rel="noopener">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
            'Baixar' +
          '</a>' +
          '<a href="' + esc(direct) + '" target="_blank" class="pv__btn pv__btn--primary" rel="noopener">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>' +
            'Abrir em nova aba' +
          '</a>' +
        '</div>' +
      '</div>' +
      '<iframe class="pv__pdf-frame" id="pvFrame" src="' + esc(embed) + '" title="Visualização do PDF"></iframe>';

    /* Fallback: se embed.aspx não carregar o PDF, tenta a URL direta depois de 4s */
    var frame = document.getElementById('pvFrame');
    var fallbackTimer = setTimeout(function() {
      try {
        /* Tenta acessar o conteúdo do iframe — se não for PDF, será um erro de CORS ou uma página SharePoint */
        var loc = frame.contentWindow.location.href;
        /* Se chegou aqui sem erro e a URL contém "AllItems" ou "Forms", não é o PDF */
        if (loc && (loc.indexOf('AllItems') > -1 || loc.indexOf('/Forms/') > -1)) {
          frame.src = direct;
        }
      } catch(e) {
        /* Cross-origin = provavelmente OK (PDF carregou em outro domínio) */
      }
    }, 3000);

    frame.addEventListener('load', function() {
      clearTimeout(fallbackTimer);
      try {
        var loc = frame.contentWindow.location.href;
        if (loc && (loc.indexOf('AllItems') > -1 || loc.indexOf('/Forms/') > -1 || loc.indexOf('Error') > -1)) {
          /* SharePoint redirecionou para a view da biblioteca — usar URL direta */
          frame.src = direct;
        }
      } catch(e) {
        /* Cross-origin — normalmente significa que carregou corretamente */
      }
    });
  }

  /* ---- Events ---- */
  $list.addEventListener('click', function(e) {
    var openBtn = e.target.closest('[data-open]');
    if (openBtn) {
      e.stopPropagation();
      var f = state.filtered[+openBtn.getAttribute('data-open')];
      if (f) window.open(directUrl(f), '_blank');
      return;
    }
    var item = e.target.closest('[data-i]');
    if (item) showPdf(+item.getAttribute('data-i'));
  });

  var searchTimer;
  $search.addEventListener('input', function() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(function() {
      var q = $search.value.toLowerCase().trim();
      state.active = -1;
      renderList(q ? state.files.filter(function(f){ return f.name.toLowerCase().indexOf(q) > -1; }) : state.files);
      $pdf.innerHTML =
        '<div class="pv__pdf-placeholder">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>' +
          '<span>Selecione um certificado para visualizar</span>' +
        '</div>';
    }, 200);
  });

  /* ---- Init ---- */
  fetchPDFs()
    .then(function(files) {
      state.files = files;
      $loading.style.display = 'none';
      $layout.style.display = 'flex';
      renderList(files);
    })
    .catch(function(err) {
      $loading.style.display = 'none';
      $error.style.display = 'block';
      $error.textContent = err.message || 'Erro ao carregar certificados.';
    });
})();
</script>
